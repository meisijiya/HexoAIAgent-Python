<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 登录中...</title>
    <style>
        :root {
            --primary: #2d96bd;
            --bg: #fbfbfb;
            --text: #161209;
            --text-secondary: #a9a9b3;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #5bb8d4;
                --bg: #292a2d;
                --text: #a9a9b3;
                --text-secondary: #87878d;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container { text-align: center; padding: 32px; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--text-secondary);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .message { font-size: 16px; color: var(--text); margin-bottom: 8px; }
        .sub-message { font-size: 13px; color: var(--text-secondary); }
        .error { color: #dc2626; font-size: 14px; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <div class="message" id="msg">正在完成 GitHub 登录...</div>
        <div class="sub-message" id="sub">eggegg，稍等一下～</div>
        <div class="error" id="error" style="display:none"></div>
    </div>
    <script>
    (function() {
        'use strict';
        var params = new URLSearchParams(window.location.search);
        var code = params.get('code');
        var state = params.get('state');
        var error = params.get('error');
        var msgEl = document.getElementById('msg');
        var subEl = document.getElementById('sub');
        var errEl = document.getElementById('error');
        if (error) {
            msgEl.textContent = '登录失败';
            subEl.textContent = '';
            errEl.textContent = '请关闭此窗口并重试';
            errEl.style.display = 'block';
            if (window.opener) window.opener.postMessage({ type: 'github-oauth-error', error: error }, '*');
            return;
        }
        if (!code || !state) {
            msgEl.textContent = '参数缺失';
            subEl.textContent = '';
            errEl.textContent = '授权信息不完整，请关闭并重试';
            errEl.style.display = 'block';
            return;
        }
        var apiUrl = '/api/auth/github/callback?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state);
        fetch(apiUrl)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.token) {
                    msgEl.textContent = '登录成功！eggegg～';
                    subEl.textContent = '窗口即将关闭...';
                    if (window.opener) {
                        window.opener.postMessage({ type: 'github-oauth-success', token: data.token, user: data.user }, '*');
                    }
                    setTimeout(function() { window.close(); }, 2000);
                } else {
                    throw new Error(data.detail || '未知错误');
                }
            })
            .catch(function(err) {
                msgEl.textContent = '登录失败';
                subEl.textContent = '';
                errEl.textContent = err.message || '请求失败，请关闭并重试';
                errEl.style.display = 'block';
                if (window.opener) window.opener.postMessage({ type: 'github-oauth-error', error: err.message }, '*');
            });
    })();
    </script>
</body>
</html>
