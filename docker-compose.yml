# ==================== 本地开发环境 ====================
# 使用命令: docker-compose up -d
# 停止命令: docker-compose down
# 查看日志: docker-compose logs -f agent-service

version: '3.8'

services:
  # ==================== PostgreSQL + pgvector ====================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hexo-agent-postgres
    environment:
      POSTGRES_DB: hexo_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hexo-agent-network

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: hexo-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hexo-agent-network

  # ==================== Python AI 服务 ====================
  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: hexo-agent-service
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/hexo_agent
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=true
    env_file:
      - ./agent-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agent-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - hexo-agent-network

# ==================== 网络配置 ====================
networks:
  hexo-agent-network:
    driver: bridge

# ==================== 数据卷 ====================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
